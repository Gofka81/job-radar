# Copy to config.yml and edit. config.yml is gitignored.

# --- Title filter ---
# A title passes if >=1 positive matches AND 0 negatives match (case-insensitive substring).
title_filter:
  positive:
    - "Data Engineer"
    - "Analytics Engineer"
    - "Data Platform"
    - "PySpark"
    - "Spark"
    - "Databricks"
    - "Snowflake"
    - "Delta Lake"
    - "Airflow"
    - "ETL"
    - "ELT"
    - "Data Pipeline"
    - "Lakehouse"
  negative:
    # Trim seniority you don't want + stacks you don't work in
    - "Junior"
    - "Intern"
    - "Graduate"
    - "Principal"
    - "Head of"
    - "Director"
    - "Manager"          # remove if you want lead/management roles
    - ".NET"
    - "PHP"
    - "Salesforce"

# --- Location filter ---
# block wins over allow. Empty job location passes (don't penalise missing data).
location_filter:
  allow:
    - "Edinburgh"
    - "Glasgow"
    - "Scotland"
    - "Remote"
    - "United Kingdom"
    - "UK"
  block: []
  # Note: a "London (Remote)" role passes via "Remote"; pure on-site London with no
  # remote tag won't match allow unless "London" is added. Tune to taste.

# --- Priority cities ---
# Used two ways: when a raw location matches several cities the first priority hit
# wins, and a multi-city posting shows its first priority city in the dashboard
# preview (so a priority city is never hidden behind "+N"). Omit to use the default
# (Edinburgh, Glasgow, London).
priority_locations:
  - "Edinburgh"
  - "Glasgow"
  - "London"

# --- Lifecycle ---
# A 'new' job not seen in a source's listing for this many hours is marked
# 'expired' (closed/filled) and drops off the active list. This is ALSO the dedup
# recency window: a vacancy re-seen within it merges into its live row, while one
# that reappears AFTER expiring gets a fresh row (a new evaluation generation).
# Source-presence is the reliable signal; we don't URL-poke (aggregators block
# bots). 24h tolerates a missed scan or two before expiring.
expire_after_hours: 24

# --- Deep vs regular scans ---
# A REGULAR scan (scheduled hourly + the "Scan now" button) only looks `recent_days`
# back — cheaper, fresh-only, fewer API calls. A DEEP scan (the 🔭 button /
# POST /api/scan?deep=1 / `job-scan --deep`) ignores this and pulls the full window
# (e.g. Adzuna max_days_old=7) to load/refresh the whole week.
#
# Unset `recent_days` (the default) = regular scans use the full window too (no change).
# To run light hourly + a manual weekly deep:  set recent_days: 1  AND raise
# expire_after_hours to ~180 (≈7.5 days) so the deep-loaded week persists between deep
# scans (a job not re-seen by the tight hourly scans would otherwise expire in 24h).
# recent_days: 1

# After a scan, fetch the FULL JD for sources whose search response is only a
# snippet but expose a detail API (currently Reed: 452-char snippet → full text).
# Deterministic API call (not scraping); one-shot per job via the jd_full flag.
# Adzuna stays a snippet (no full-JD API). Set false to disable.
fetch_full_jd: true

# --- Sources ---
sources:
  adzuna:
    enabled: true
    country: gb
    queries: ["data engineer", "analytics engineer", "databricks"]
    # Per-location targeting: each entry is its own date-sorted pull, so London's
    # volume can't crowd out Edinburgh/Glasgow. where: "" = nationwide/remote pass.
    # API BUDGET: calls/scan = queries × locations × max_pages. Adzuna free tier is
    # ~250/day; with ~7 scans/day keep queries×locations×max_pages ≲ 35 (here 3×4×2=24).
    locations:
      - { where: "Edinburgh", distance: 40 }   # km
      - { where: "Glasgow",   distance: 40 }
      - { where: "London",    distance: 30 }
      - { where: "" }                          # nationwide + remote catch-all
    category: it-jobs          # server-side narrowing; "" to disable
    # Server-side exclude to stop obvious non-matches eating the page budget.
    # CAUTION: this matches the FULL ad text, not just the title — so keep it to
    # words that never appear in a mid-level DE description. Do NOT add
    # senior/lead/manager here (they show up in plenty of mid-level JDs and you'd
    # lose real roles); the title_filter.negative list trims those precisely.
    what_exclude: "graduate intern apprentice apprenticeship internship placement"
    sort_by: date              # freshest first
    max_days_old: 7            # tight window — we scan often + dedup makes re-fetch free
    max_pages: 2               # keep low: multiplies with queries × locations
    results_per_page: 50

  reed:
    enabled: true
    queries: ["data engineer", "analytics engineer"]
    locations:                 # mirror of adzuna; distance in MILES for Reed
      - { where: "Edinburgh", distance: 40 }
      - { where: "Glasgow",   distance: 40 }
      - { where: "London",    distance: 30 }
      - { where: "" }                          # nationwide
    results_to_take: 100

  indeed:
    enabled: false             # Indeed mobile GraphQL API (no key). Covers Indeed +
                               # Glassdoor (shared index). Distance in MILES; where=""
                               # is a nationwide/remote pass. Full JD comes with search.
    queries: ["data engineer", "analytics engineer"]
    locations:
      - { where: "Edinburgh", distance: 40 }
      - { where: "Glasgow",   distance: 40 }
      - { where: "London",    distance: 30 }
      - { where: "" }                          # nationwide + remote catch-all
    hours_old: 168
    max_pages: 2
    results_per_page: 50

  # ATS boards take a list of company slugs (the bit after the ATS domain).
  # CURATE THESE — verify each slug resolves (200, not 404). Examples below are
  # illustrative; replace with UK data-heavy employers you care about.
  greenhouse:
    enabled: false
    companies: []             # e.g. "monzo", "wise", "deliveroo"  ← verify slugs

  lever:
    enabled: false
    companies: []             # e.g. "spotify"  ← verify slugs

  ashby:
    enabled: false
    companies: []             # ← verify slugs

  # Workday is self-hosted per employer (UK banks/enterprise: NatWest, Lloyds…).
  # Find host+site from the careers URL: https://{host}/{lang}/{site} — e.g.
  # https://natwest.wd3.myworkdayjobs.com/en-US/NatWestGroup → host=natwest.wd3.
  # myworkdayjobs.com, site=NatWestGroup. `queries` narrows server-side so we only
  # pull JD detail for relevant roles; keep them tight to save requests.
  workday:
    enabled: false
    queries: ["data engineer", "data platform", "analytics engineer"]
    max_pages: 2
    companies:
      # Verified working (returns the CXS JSON). Add your targets the same way —
      # host+site come from the careers URL https://{host}/{lang}/{site}.
      # - { host: "livenation.wd503.myworkdayjobs.com", site: "TMExternalSite", name: "Live Nation" } WORKING EXAMPLE

  # Oracle Cloud Recruiting (ORC) — self-hosted per tenant (banks: JPMorgan…).
  # site = the `siteNumber` from the careers URL
  # https://{host}/hcmUI/CandidateExperience/en/sites/{site}. `keyword` (queries)
  # searches the full JD server-side.
  oracle:
    enabled: false
    queries: ["data engineer", "data platform", "analytics engineer"]
    max_pages: 2
    companies:
      # Verified working (returns the CE REST JSON).
      # - { host: "<test-company>.fa.<region if needed>.oraclecloud.com", site: "Site suffix", name: "Alias for company name" }
      # - { host: "jpmc.fa.oraclecloud.com", site: "CX_1001", name: "JPMorgan" } WORKING EXAMPLE

# --- On-server LLM triage (Stage 1) ---
# Scores already-discovered jobs for fit from the stored JD (0-10). Discovery
# stays deterministic — this is the only LLM step in this repo, and it only ranks
# the pending list. Triggered from the dashboard/phone (POST /api/analyze); writes
# score + reason, never touches the workflow `status`. Needs ANTHROPIC_API_KEY.
# The personal candidate profile lives in a SEPARATE file, analysis/rubric.md
# (gitignored; baked fallback analysis/rubric.example.md), editable via
# GET/POST /api/rubric — not here, to keep CV/comp out of this public example.
analysis:
  engine: claude-cli           # DEFAULT: Claude Code on your Pro subscription (no API $;
                               #   needs the `claude` CLI logged in / CLAUDE_CODE_OAUTH_TOKEN).
                               # 'api' = Anthropic SDK (pay-per-token, needs ANTHROPIC_API_KEY).
  model: claude-haiku-4-5      # cheapest tier; fine for 0-10 triage
  # Hard cap on LLM calls per batch run. With the claude-cli engine each call eats
  # your Pro 5-hour quota, so keep this modest (a big batch can rate-limit you AND
  # lock you out of interactive Claude). ~15-25 is sane for Pro; re-run for the rest,
  # or use a card's ✨ to score one at a time. Raise it only on the metered api engine.
  max_jobs: 20
