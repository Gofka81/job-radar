name: job-radar

# Pi deployment via Portainer GitOps: point a stack at the PUBLIC repo, redeploy
# on push. Single service — the FastAPI server, which serves the dashboard/API
# AND owns scanning (APScheduler on SCAN_HOURS + on-demand POST /api/scan). It is
# the sole DB writer.
#
# NOTHING PERSONAL IN GIT:
#   - Secrets are Portainer stack environment variables (the ${...} below).
#   - config.yml is written via POST /api/config and lives on the jobs-data
#     volume — edit it from the dashboard, no redeploy.
#
# The port is published on the host so your own reverse proxy / tunnel / ingress
# (managed separately) can route to it. Narrow to 127.0.0.1 if that runs on the
# same host.
#
# Local dev:  ADZUNA_APP_ID=... JOB_RADAR_API_TOKEN=... docker compose up --build

services:
  server:
    build: .
    container_name: job-radar-server
    restart: unless-stopped
    environment:
      - ADZUNA_APP_ID=${ADZUNA_APP_ID:-}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY:-}
      - REED_API_KEY=${REED_API_KEY:-}
      - JOB_RADAR_API_TOKEN=${JOB_RADAR_API_TOKEN}
      - SCAN_HOURS=${SCAN_HOURS:-7-19/2}
      - TZ=${TZ:-Europe/London}
    volumes:
      - jobs-data:/app/data        # DuckDB + live config.yml
    ports:
      - "${JOB_RADAR_PORT:-8088}:8000"

volumes:
  jobs-data:
